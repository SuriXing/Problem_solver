name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint -- --max-warnings 0

      - name: Type-check
        run: npm run type-check

      - name: Test with coverage
        env:
          # Stub envs so module-load checks (getSupabaseUrl etc.) don't throw
          # when v8 coverage imports every src file for instrumentation.
          # These are NOT real credentials — never connect to Supabase from CI.
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub-anon-key-for-ci
        run: npm run coverage

      - name: Build
        env:
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub-anon-key-for-ci
        run: npm run build
